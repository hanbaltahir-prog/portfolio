<!DOCTYPE html>
<html>
<head>
  <title>Hanbal Portfolio</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
    }

    /* PARTICLES */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      background: rgba(15,23,42,0.8);
      backdrop-filter: blur(10px);
      padding: 15px 0;
      border-bottom: 1px solid #1e293b;
      z-index: 100;
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      max-width: 1000px;
      margin: auto;
    }

    .logo {
      color: cyan;
      font-weight: bold;
      font-size: 22px;
    }

    .nav-links a {
      margin-left: 25px;
      color: white;
      text-decoration: none;
      position: relative;
    }

    .nav-links a:hover {
      color: cyan;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 50px;
      color: cyan;
    }

    #typing {
      color: #cbd5e1;
      font-size: 18px;
      height: 24px;
    }

    /* 🔥 BUTTON (MAIN) */
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, cyan, #22d3ee);
      color: black;
      padding: 14px 30px;
      border-radius: 12px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
      margin-top: 20px;
    }

    /* ✨ GLOW EFFECT */
    .btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 0 20px cyan, 0 0 40px rgba(0,255,255,0.5);
    }

    /* SECTIONS */
    h2 {
      text-align: center;
      margin-top: 60px;
    }

    /* PROJECT GRID */
    .projects {
      display: grid;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      transition: 0.3s;
      opacity: 0;
      transform: translateY(30px);
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
    }

    /* 🔥 PROJECT BUTTON (FIXED) */
    .project-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      border-radius: 8px;
      background: transparent;
      border: 2px solid cyan;
      color: cyan;
      text-decoration: none;
      transition: 0.3s;
    }

    .project-btn:hover {
      background: cyan;
      color: black;
      box-shadow: 0 0 15px cyan;
    }

    /* CTA */
    .bottom-btn {
      text-align: center;
      margin: 60px;
    }

    /* RESPONSIVE */
    @media (min-width:700px){
      .projects {
        grid-template-columns: 1fr 1fr;
      }
    }

  </style>
</head>

<body>

<div id="particles-js"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-content">
    <div class="logo">Hanbal</div>
    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="mailto:hanbaltahir@gmail.com">Contact</a>
    </div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Hanbal</h1>
  <p id="typing"></p>
  <a href="mailto:hanbaltahir@gmail.com" class="btn">Hire Me</a>
</div>

<div class="container">

  <h2 id="about">About Me</h2>
  <p style="text-align:center;">
    I create videos & websites.
  </p>

  <h2 id="projects">Projects</h2>

  <div class="projects">

    <div class="card">
      <h3>🎬 Video Editing</h3>
      <p>Short-form content for social media.</p>
    </div>

    <div class="card">
      <h3>🌐 Personal Website</h3>
      <p>My first modern portfolio.</p>
      <a href="#" class="project-btn">View Project</a>
    </div>

  </div>

  <div class="bottom-btn">
    <a href="mailto:hanbaltahir@gmail.com" class="btn">Contact Me</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
/* typing */
const text=["Video Editor","Web Developer","Freelancer"];
let i=0,j=0,cur="",del=false;
function type(){
  let el=document.getElementById("typing");
  if(!del && j<text[i].length){cur+=text[i][j++];}
  else if(del && j>0){cur=cur.slice(0,-1);j--;}
  el.textContent=cur;
  if(j===text[i].length){del=true;setTimeout(type,1000);return;}
  if(j===0 && del){del=false;i=(i+1)%text.length;}
  setTimeout(type,del?50:100);
}
type();

/* scroll animation */
document.querySelectorAll('.card').forEach(c=>{
  window.addEventListener('scroll',()=>{
    if(c.getBoundingClientRect().top<window.innerHeight-50){
      c.classList.add('show');
    }
  });
});

/* particles */
particlesJS("particles-js",{
  particles:{
    number:{value:60},
    size:{value:3},
    color:{value:"#00ffff"},
    line_linked:{enable:true,color:"#00ffff"},
    move:{speed:2}
  }
});
</script>

</body>
</html>
