<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- 🔥 IMPORTANT: FIXES MOBILE SCALING -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hanbal Portfolio</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      background: rgba(2, 6, 23, 0.9);
      backdrop-filter: blur(10px);
      padding: 15px 0;
      border-bottom: 1px solid #1e293b;
      z-index: 100;
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    /* LOGO */
    .logo svg {
      border-radius: 50%;
      box-shadow: 0 0 15px cyan;
      transition: 0.3s;
    }

    .logo svg:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px cyan;
    }

    .nav-links a {
      margin-left: 25px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: cyan;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: clamp(36px, 8vw, 56px); /* 🔥 responsive text */
      color: cyan;
      text-shadow: 0 0 25px cyan;
    }

    .hero p {
      color: #cbd5e1;
      font-size: clamp(14px, 3vw, 18px);
    }

    /* BUTTON */
    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 30px;
      border-radius: 10px;
      background: linear-gradient(135deg, cyan, #22d3ee);
      color: black;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px cyan;
    }

    /* CONTAINER */
    .container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-top: 60px;
      font-size: clamp(22px, 5vw, 32px);
    }

    /* PROJECTS GRID */
    .projects {
      display: grid;
      gap: 25px;
      margin-top: 40px;
    }

    @media (min-width:700px){
      .projects {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* CARDS */
    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      transition: 0.4s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 0 30px cyan;
    }

    .card video {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    /* CARD BUTTON */
    .card a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: linear-gradient(135deg, cyan, #22d3ee);
      color: black;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .card a:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px cyan;
    }

    /* CONTACT BUTTON */
    .bottom-btn {
      text-align: center;
      margin: 60px 0;
    }

    /* 🔥 MOBILE OPTIMIZATION */
    @media (max-width: 700px) {

      .nav-links a {
        margin-left: 15px;
        font-size: 14px;
      }

      .hero {
        padding: 60px 15px;
      }

      .card {
        padding: 20px;
      }

    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-content">

    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="cyan"/>
        <text x="50%" y="55%" text-anchor="middle" fill="black" font-size="40" dy=".3em">H</text>
      </svg>
    </div>

    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="mailto:hanbaltahir@gmail.com">Contact</a>
    </div>

  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Hanbal</h1>
  <p>Video Editor & Web Developer</p>
  <a href="mailto:hanbaltahir@gmail.com" class="btn">Hire Me</a>
</div>

<div class="container">

  <!-- ABOUT -->
  <h2 id="about">About Me</h2>
  <p style="text-align:center;">
    I create videos & modern websites.
  </p>

  <!-- PROJECTS -->
  <h2 id="projects">Projects</h2>

  <div class="projects">

    <!-- VIDEO -->
    <div class="card">
      <h3>🎬 Video Editing</h3>

      <video id="video1" muted loop>
        <source src="video1.mp4" type="video/mp4">
      </video>

      <p>Short-form edits for Reels, TikTok & YouTube.</p>

      <a href="#">View Project</a>
    </div>

    <!-- WEBSITE -->
    <div class="card">
      <h3>🌐 Website</h3>
      <p>Modern portfolio built using HTML & CSS.</p>
      <a href="#">View Project</a>
    </div>

  </div>

  <!-- CONTACT -->
  <div class="bottom-btn">
    <a href="mailto:hanbaltahir@gmail.com" class="btn">Contact Me</a>
  </div>

</div>

<!-- VIDEO HOVER -->
<script>
const video = document.getElementById("video1");
const card = video.closest(".card");

card.addEventListener("mouseenter", () => {
  video.play();
});

card.addEventListener("mouseleave", () => {
  video.pause();
});
</script>

</body>
</html>
