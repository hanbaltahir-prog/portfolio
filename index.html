<!DOCTYPE html>
<html>
<head>
  <title>Hanbal Portfolio</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
      color: white;
      overflow-x: hidden;
    }

    /* INTRO SCREEN */
    #intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #020617;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      animation: fadeOut 1s ease forwards;
      animation-delay: 2s;
    }

    #intro svg {
      width: 80px;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 5px cyan); }
      to { filter: drop-shadow(0 0 25px cyan); }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    /* PARTICLES */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle at top, #0f172a, #020617);
    }

    /* NAV */
    .navbar {
      position: sticky;
      top: 0;
      background: rgba(2,6,23,0.8);
      backdrop-filter: blur(10px);
      padding: 15px;
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    .hero h1 {
      font-size: 56px;
      color: cyan;
    }

    #typing {
      color: #cbd5e1;
      height: 25px;
    }

    .btn {
      margin-top: 20px;
      padding: 14px 30px;
      background: cyan;
      color: black;
      text-decoration: none;
      display: inline-block;
    }

    /* CARDS */
    .projects {
      display: grid;
      gap: 30px;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      opacity: 0;
      transform: translateY(40px);
      transition: 0.6s;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      box-shadow: 0 0 20px cyan;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    @media(min-width:700px){
      .projects { grid-template-columns: 1fr 1fr; }
    }

  </style>
</head>

<body>

<!-- 🔥 INTRO -->
<div id="intro">
  <svg viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="cyan"/>
    <text x="50%" y="55%" text-anchor="middle" fill="black" font-size="40">H</text>
  </svg>
</div>

<div id="particles-js"></div>

<!-- NAV -->
<div class="navbar">
  <div class="nav-content">
    <div>H</div>
    <div>
      <a href="#projects">Projects</a>
    </div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Hanbal</h1>
  <p id="typing"></p>
  <a href="#" class="btn">Hire Me</a>
</div>

<!-- PROJECTS -->
<div class="projects">
  <div class="card">
    <h3>🎬 Video Editing</h3>
    <img src="https://via.placeholder.com/400x200">
  </div>

  <div class="card">
    <h3>🌐 Website</h3>
    <img src="https://via.placeholder.com/400x200">
  </div>
</div>

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 30 }, /* reduced */
    size: { value: 2 },
    color: { value: "#00ffff" },
    line_linked: { enable: true, color: "#00ffff" },
    move: { speed: 1 }
  }
});
</script>

<!-- TYPING -->
<script>
const words=["Video Editor","Web Developer","Freelancer"];
let i=0,j=0,current="",del=false;

function type(){
let el=document.getElementById("typing");

if(!del && j<=words[i].length){
current=words[i].substring(0,j++);
}
else if(del && j>=0){
current=words[i].substring(0,j--);
}

el.textContent=current;

if(j==words[i].length) del=true;
if(j==0 && del){ del=false; i=(i+1)%words.length;}

setTimeout(type, del?50:100);
}
type();
</script>

<!-- SCROLL -->
<script>
const cards=document.querySelectorAll('.card');

window.addEventListener('scroll',()=>{
cards.forEach(card=>{
const rect=card.getBoundingClientRect();
if(rect.top < window.innerHeight-50){
card.classList.add('show');
}
});
});
</script>

</body>
</html>
