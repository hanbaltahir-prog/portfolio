<!DOCTYPE html>
<html>
<head>
  <title>Hanbal Portfolio</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: #020617;
      overflow-x: hidden;
    }

    /* PARTICLES BACKGROUND */
    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(circle at top, #0f172a, #020617);
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(12px);
      padding: 15px 0;
      border-bottom: 1px solid rgba(0,255,255,0.2);
      z-index: 100;
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    /* LOGO */
    .logo {
      font-weight: bold;
      font-size: 18px;
      color: cyan;
    }

    /* NAV LINKS FIX */
    .nav-links a {
      margin-left: 25px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .nav-links a:visited {
      color: white;
    }

    .nav-links a:hover {
      color: cyan;
    }

    /* GLOBAL LINK FIX */
    a {
      color: cyan;
      text-decoration: none;
    }

    a:visited {
      color: cyan;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    .hero h1 {
      font-size: 56px;
      color: cyan;
      text-shadow: 0 0 25px cyan;
    }

    #typing {
      color: #cbd5e1;
      height: 25px;
      margin-top: 10px;
    }

    /* BUTTON */
    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 30px;
      border-radius: 10px;
      background: linear-gradient(135deg, cyan, #22d3ee);
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px cyan;
    }

    /* CONTAINER */
    .container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-top: 80px;
    }

    /* PROJECTS */
    .projects {
      display: grid;
      gap: 30px;
      margin-top: 40px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      transition: 0.4s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 0 30px cyan;
    }

    .card p {
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    /* RESPONSIVE */
    @media (min-width:700px){
      .projects {
        grid-template-columns: 1fr 1fr;
      }
    }

  </style>
</head>

<body>

<div id="particles-js"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-content">
    <div class="logo">H</div>

    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="mailto:hanbaltahir@gmail.com">Contact</a>
    </div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Hanbal</h1>
  <p id="typing"></p>
  <a href="mailto:hanbaltahir@gmail.com" class="btn">Hire Me</a>
</div>

<div class="container">

  <!-- ABOUT -->
  <h2 id="about">About Me</h2>
  <p style="text-align:center;">
    I create videos & modern websites.
  </p>

  <!-- PROJECTS -->
  <h2 id="projects">Projects</h2>

  <div class="projects">

    <div class="card">
      <h3>🎬 Video Editing</h3>
      <p>Short-form edits for Reels, TikTok & YouTube.</p>
      <a href="#" class="btn">View Project</a>
    </div>

    <div class="card">
      <h3>🌐 Website</h3>
      <p>Modern portfolio built using HTML & CSS.</p>
      <a href="#" class="btn">View Project</a>
    </div>

  </div>

</div>

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 35 },
    size: { value: 2 },
    color: { value: "#00ffff" },
    line_linked: { enable: true, color: "#00ffff" },
    move: { speed: 1 }
  }
});
</script>

<!-- TYPING EFFECT -->
<script>
const words = ["Video Editor", "Web Developer", "Freelancer"];
let i = 0, j = 0, current = "", deleting = false;

function type() {
  let el = document.getElementById("typing");

  if (!deleting && j <= words[i].length) {
    current = words[i].substring(0, j++);
  } else if (deleting && j >= 0) {
    current = words[i].substring(0, j--);
  }

  el.textContent = current;

  if (j == words[i].length) deleting = true;
  if (j == 0 && deleting) {
    deleting = false;
    i = (i + 1) % words.length;
  }

  setTimeout(type, deleting ? 50 : 100);
}

type();
</script>

</body>
</html>
</body>
</html>
