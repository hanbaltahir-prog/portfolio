<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanbal Portfolio</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
    }

    /* 🔥 PARTICLES CANVAS */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      background: rgba(2, 6, 23, 0.9);
      backdrop-filter: blur(10px);
      padding: 15px 0;
      border-bottom: 1px solid #1e293b;
      z-index: 10;
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    .logo svg {
      border-radius: 50%;
      box-shadow: 0 0 15px cyan;
      transition: 0.3s;
    }

    .logo svg:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px cyan;
    }

    .nav-links a {
      margin-left: 25px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: cyan;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: clamp(36px, 8vw, 56px);
      color: cyan;
      text-shadow: 0 0 25px cyan;
    }

    .hero p {
      color: #cbd5e1;
    }

    /* BUTTON */
    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 30px;
      border-radius: 10px;
      background: linear-gradient(135deg, cyan, #22d3ee);
      color: black;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px cyan;
    }

    /* CONTAINER */
    .container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-top: 60px;
    }

    /* PROJECTS */
    .projects {
      display: grid;
      gap: 25px;
      margin-top: 40px;
    }

    @media (min-width:700px){
      .projects {
        grid-template-columns: 1fr 1fr;
      }
    }

    /* CARD FIX */
    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      transition: 0.4s;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      min-height: 280px;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 0 30px cyan;
    }

    .card p {
      margin: 10px 0 20px;
    }

    /* VIDEO FIX */
    .card video {
      display: none;
    }

    .card a {
      padding: 12px 25px;
      background: linear-gradient(135deg, cyan, #22d3ee);
      color: black;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .card a:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px cyan;
    }

    .bottom-btn {
      text-align: center;
      margin: 60px 0;
    }

  </style>
</head>

<body>

<!-- 🔥 PARTICLES -->
<canvas id="particles"></canvas>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-content">

    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="cyan"/>
        <text x="50%" y="55%" text-anchor="middle" fill="black" font-size="40">H</text>
      </svg>
    </div>

    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="mailto:hanbaltahir@gmail.com">Contact</a>
    </div>

  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Hanbal</h1>
  <p>Video Editor & Web Developer</p>
  <a href="mailto:hanbaltahir@gmail.com" class="btn">Hire Me</a>
</div>

<div class="container">

  <!-- ABOUT -->
  <h2 id="about">About Me</h2>
  <p style="text-align:center;">
    I create videos & modern websites.
  </p>

  <!-- PROJECTS -->
  <h2 id="projects">Projects</h2>

  <div class="projects">

    <div class="card">
      <h3>🎬 Video Editing</h3>
      <p>Short-form edits for Reels, TikTok & YouTube.</p>
      <a href="#">View Project</a>
    </div>

    <div class="card">
      <h3>🌐 Website</h3>
      <p>Modern portfolio built using HTML & CSS.</p>
      <a href="#">View Project</a>
    </div>

  </div>

  <div class="bottom-btn">
    <a href="mailto:hanbaltahir@gmail.com" class="btn">Contact Me</a>
  </div>

</div>

<!-- 🔥 PARTICLES SCRIPT -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5),
    vy: (Math.random() - 0.5)
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = "cyan";
    ctx.fill();

    for (let j = i + 1; j < particles.length; j++) {
      let p2 = particles[j];
      let dist = Math.hypot(p.x - p2.x, p.y - p2.y);

      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = "rgba(0,255,255,0.2)";
        ctx.stroke();
      }
    }
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
