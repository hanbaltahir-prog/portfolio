<!DOCTYPE html>
<html>
<head>
  <title>Hanbal Portfolio</title>

  <style>
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(10px);
      padding: 15px 0;
      border-bottom: 1px solid #1e293b;
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    /* LOGO */
    .logo svg {
      border-radius: 50%;
      box-shadow: 0 0 15px cyan;
      transition: 0.3s;
    }

    .logo svg:hover {
      transform: scale(1.1);
      box-shadow: 0 0 35px cyan;
    }

    .nav-links a {
      margin-left: 25px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: cyan;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    .hero h1 {
      font-size: 56px;
      color: cyan;
      text-shadow: 0 0 25px cyan;
    }

    .hero p {
      color: #cbd5e1;
    }

    /* BUTTON */
    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 30px;
      border-radius: 10px;
      background: linear-gradient(135deg, cyan, #22d3ee);
      color: black;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px cyan;
    }

    /* CONTAINER */
    .container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-top: 80px;
    }

    /* PROJECTS */
    .projects {
      display: grid;
      gap: 25px;
      margin-top: 40px;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      transition: 0.4s;
      overflow: hidden;
    }

    /* 🔥 CARD HOVER */
    .card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 0 30px cyan;
    }

    /* VIDEO */
    .card video {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    /* BUTTON INSIDE CARD */
    .card a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: linear-gradient(135deg, cyan, #22d3ee);
      color: black;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .card a:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px cyan;
    }

    .bottom-btn {
      text-align: center;
      margin: 60px 0;
    }

    @media (min-width:700px){
      .projects {
        grid-template-columns: 1fr 1fr;
      }
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-content">

    <!-- SVG LOGO -->
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="cyan"/>
        <text x="50%" y="55%" text-anchor="middle" fill="black" font-size="40" dy=".3em">H</text>
      </svg>
    </div>

    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="mailto:hanbaltahir@gmail.com">Contact</a>
    </div>

  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Hanbal</h1>
  <p>Video Editor & Web Developer</p>
  <a href="mailto:hanbaltahir@gmail.com" class="btn">Hire Me</a>
</div>

<div class="container">

  <!-- ABOUT -->
  <h2 id="about">About Me</h2>
  <p style="text-align:center;">
    I create videos & modern websites.
  </p>

  <!-- PROJECTS -->
  <h2 id="projects">Projects</h2>

  <div class="projects">

    <!-- 🎬 VIDEO EDITING -->
    <div class="card">
      <h3>🎬 Video Editing</h3>

      <video id="video1" muted loop>
        <source src="video1.mp4" type="video/mp4">
      </video>

      <p>Short-form edits for Reels & TikTok.</p>

      <a href="#">View Project</a>
    </div>

    <!-- 🌐 WEBSITE -->
    <div class="card">
      <h3>🌐 Personal Website</h3>
      <p>Modern portfolio built using HTML & CSS.</p>
      <a href="#">View Project</a>
    </div>

  </div>

  <!-- CTA -->
  <div class="bottom-btn">
    <a href="mailto:hanbaltahir@gmail.com" class="btn">Contact Me</a>
  </div>

</div>

<!-- 🎬 VIDEO HOVER SCRIPT -->
<script>
const video = document.getElementById("video1");
const card = video.closest(".card");

card.addEventListener("mouseenter", () => {
  video.play();
});

card.addEventListener("mouseleave", () => {
  video.pause();
});
</script>

</body>
</html>
